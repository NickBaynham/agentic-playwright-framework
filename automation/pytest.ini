[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --html=reports/html/report.html
    --self-contained-html
    --junitxml=reports/junit/results.xml

markers =
    ui: UI test against a browser
    api: API test against an HTTP endpoint
    smoke: Smoke-level coverage; runs in CI on every change
    regression: Regression-level coverage; runs on a slower cadence
    negative: Negative-path test that asserts on rejection or validation
    login: Touches the login flow
    cart: Touches the cart flow
    checkout: Touches the checkout flow
    inventory: Touches the inventory listing
    needs_clarification: Behavior depends on an unresolved open question
    potential_defect: Asserts a potential defect; document in the implementation report
